<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro de Mascotas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div id="nav-container"></div>

    <main class="container mt-5 position-relative">


        <h2 class="mb-4">Registrar Mascota</h2>

        <div class="system-logo-container">
            <img src="../img/logo.png"
                alt="Logo Veterinaria"
                class="system-logo">
        </div>

        <form id="petForm" class="card p-4 shadow">

            <input type="hidden" id="petId">

            <div class="mb-3">
                <label class="form-label">Nombre Mascota</label>
                <input type="text" id="name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Edad</label>
                <input type="number" id="age" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo</label>

                <select id="type" class="form-select">
                    <option value="">Seleccione</option>
                    <option>Perro</option>
                    <option>Gato</option>
                    <option>Ave</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Dueño</label>
                <input type="text" id="owner" class="form-control">
            </div>

            <button class="btn btn-success">
                Guardar Mascota
            </button>

        </form>

        <hr class="my-5">

        <div class="mb-3">
            <input type="text"
                   id="search"
                   class="form-control"
                   placeholder="Buscar por tipo">
        </div>

        <div id="petList" class="row"></div>

    </main>

    <div id="footer-container"></div>

    <script src="../js/storage.js"></script>
    <script src="../js/validations.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>

    <script>
        fetch("../components/nav.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("nav-container").innerHTML = data;
        });

        fetch("../components/footer.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("footer-container").innerHTML = data;
        });
    </script>

</body>
</html>
